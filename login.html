<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓 - 로그인</title>
    <link rel="icon" href="./images/logo/favicon.svg" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/auth.css" />
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script type="module" src="js/login.js"></script>
  </head>
  <body>
    <main class="auth-container">
      <div class="auth-logo-box">
        <a href="/" class="logo-a-area">
            <img class="auth-logo-icon" src="./images/logo/logo-icon.svg" alt="판다마켓 로고" />
            <img class="auth-logo-text" src="./images/logo/logo-text.svg" alt="판다마켓 로고 텍스트" />
        </a>
      </div>
      <form method="post" class="auth-form-box">
        <div class="auth-input-box">
          <label for="email" class="auth-label">이메일</label>
          <input type="email" id="email" class="auth-input" placeholder="이메일을 입력해주세요." />
        </div>
        <div class="auth-input-box">
          <label for="password" class="auth-label">비밀번호</label>
          <div class="auth-pwd-input-box">
            <input type="password" id="password" class="auth-input" placeholder="비밀번호를 입력해주세요." />
            <button type="button" class="show-pwd-btn">
              <img src="./images/btn/btn_visibility_off.svg" alt="비밀번호 보기" />
            </button>
          </div>
        </div>
        <button type="submit" class="base-btn auth-btn" disabled>로그인</button>
      </form>
      <aside class="social-login-box">
       <span class="social-login-text">간편 로그인하기</span>
       <div class="social-login-link-box">
         <a href="https://www.google.com/" target="_blank" rel="noopener noreferrer">
           <img src="./images/icons/ic-google.svg" alt="구글 로그인" />
         </a>
         <a href="https://www.kakaocorp.com/page/" target="_blank" rel="noopener noreferrer">
           <img src="./images/icons/ic-kakaotalk.svg" alt="카카오 로그인" />
         </a>
       </div>
     </aside>
     <div class="auth-guide-box">
         <span class="auth-guide-text">판다마켓이 처음이신가요?</span>
         <a href="./signup.html" class="auth-guide-link">회원가입</a>
     </div>
    </main>
  </body>
</html>
